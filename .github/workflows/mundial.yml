name: Bot Porra Mundial

# Bot "siempre encendido": cada ejecución escucha el chat en continuo (long-polling)
# y revisa los partidos. El cron de cada 30 min refresca el proceso (cancela el
# anterior y arranca uno nuevo), de modo que siempre hay un bot escuchando.
on:
  workflow_dispatch: {}
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

concurrency:
  group: bot-porra
  cancel-in-progress: true   # el nuevo releva al anterior

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Bot en escucha (long-polling)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py loop
