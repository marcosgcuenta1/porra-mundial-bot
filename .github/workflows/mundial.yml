name: Bot Porra Mundial

# Bot "siempre encendido": cada ejecución escucha el chat en continuo (long-polling)
# y revisa los partidos. El cron de cada 30 min refresca el proceso (cancela el
# anterior y arranca uno nuevo), de modo que siempre hay un bot escuchando.
on:
  workflow_dispatch: {}
  schedule:
    # Cada 30 min, en minutos poco congestionados (GitHub dispara los cron de :00/:30
    # peor que los demás). Si aun así se salta uno, el proceso sigue vivo hasta ~5h50.
    - cron: "13,43 * * * *"

permissions:
  contents: write

concurrency:
  group: bot-porra
  cancel-in-progress: true   # el nuevo releva al anterior

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 358
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Bot en escucha (long-polling)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BOT_STATE_KEY: ${{ secrets.BOT_STATE_KEY }}
          SPORTS_TOKEN: ${{ secrets.SPORTS_TOKEN }}
        run: python bot.py loop
