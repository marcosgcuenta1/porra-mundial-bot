name: Bot Porra Mundial

on:
  schedule:
    # Cada 5 minutos (GitHub puede retrasarlo unos minutos en horas punta).
    - cron: "*/5 * * * *"
  workflow_dispatch: {}   # permite lanzarlo a mano desde la pestaña Actions

# Necesario para que el job pueda hacer commit del state.json actualizado.
permissions:
  contents: write

# Evita que dos ejecuciones se solapen y pisen el estado.
concurrency:
  group: bot-porra
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Ejecutar bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py

      - name: Guardar estado si cambió
        run: |
          if ! git diff --quiet -- state.json; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "Actualizar estado del bot [skip ci]"
            git push
          else
            echo "Sin cambios en el estado."
          fi

# bot porra mundial 2026
